name: CI - Compilación Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar Apache Ant
        run: sudo apt-get update && sudo apt-get install -y ant

      - name: Verificar build.xml
        run: |
          test -f build.xml
          echo "Archivo build.xml encontrado."

      - name: Compilar proyecto con Ant
        run: ant -noinput -buildfile build.xml clean jar