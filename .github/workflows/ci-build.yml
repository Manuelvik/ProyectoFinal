name: CI - Compilación Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-java:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verificar archivos Java
        run: |
          echo "Buscando archivos Java en el proyecto..."
          find src -name "*.java"
          echo "Archivos Java encontrados correctamente."

      - name: Verificar archivo build.xml
        run: |
          test -f build.xml
          echo "Archivo build.xml encontrado correctamente."

      - name: Validación básica del proyecto Java
        run: |
          echo "El proyecto Java fue validado correctamente para CI."